[workspace]
members = ["profiler_macros"]
resolver = "3"

[package]
name = "profiler"
version = "0.1.0"
edition = "2024"

[dependencies]
tracing = "0.1"
tracing-subscriber = "0.3"
perf-event = "0.4.7"
thread_local = "1.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = { version = "0.2.183", optional = true }
num_cpus = { version = "1.13.1", optional = true }

profiler_macros = { path = "profiler_macros" }


[features]
default = ["libc"]
libc = ["dep:libc", "dep:num_cpus"]
