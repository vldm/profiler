[workspace]
members = ["profiler_macros"]
resolver = "3"

[package]
name = "profiler"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Multi-span metrics based profiler and benchmarking library for Rust"

[dependencies]
tracing = "0.1"
tracing-subscriber = "0.3"
perf-event = "0.4.7"
thread_local = "1.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = { version = "0.2.183", optional = true }
num_cpus = { version = "1.13.1", optional = true }

profiler_macros = { version = "0.1.1", path = "profiler_macros" }


[features]
default = ["libc"]
libc = ["dep:libc", "dep:num_cpus"]

[[bench]]
name = "easy"
harness = false

[[bench]]
name = "tracing"
harness = false

[[bench]]
name = "macro_extended"
harness = false

[[bench]]
name = "typed_fibonacci"
harness = false
